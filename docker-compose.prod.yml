version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: chozi_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chozi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chozi_prod_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - chozi_pgdata:/var/lib/postgresql/data
    networks:
      - chozi_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: chozi_backend
    restart: always
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chozi_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chozi_prod_db}?schema=public
      - BASE_URL=${BASE_URL:-https://choozi.ru}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-1374499}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.yandex.ru}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    expose:
      - "3001"
    ports:
      - "127.0.0.1:5555:5555" # Securely expose Prisma Studio for SSH tunneling
    depends_on:
      - db
    networks:
      - chozi_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: chozi_frontend
    restart: always
    ports:
      - "8080:80" # Exposed on port 8080 of the VPS, host Nginx will proxy 80/443 to this port
    depends_on:
      - backend
    networks:
      - chozi_network

volumes:
  chozi_pgdata:

networks:
  chozi_network:
    driver: bridge
